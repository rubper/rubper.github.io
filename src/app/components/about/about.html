@let t = l.t().about;
<section
  class="relative z-10  p-10 max-w-5xl mt-8 mb-12 py-10 rounded-3xl border border-zinc-200/50 dark:border-zinc-800/50 bg-white/70 dark:bg-black/40 backdrop-blur-xl shadow-xl animate-fade-in-up overflow-hidden"
>
  <div class="flex flex-col md:flex-row items-center gap-8">
    <div class="flex-shrink-0 flex items-center justify-center w-28 h-28 rounded-full bg-gradient-to-br from-zinc-100/80 to-zinc-300/40 dark:from-zinc-900/60 dark:to-zinc-800/40 border border-zinc-200/40 dark:border-zinc-800/40 shadow-lg animate-glow-pulse">
      <lucide-icon name="user" class="w-14 h-14 text-zinc-700 dark:text-zinc-200" />
    </div>
    <div class="flex-1">
      <h2 class="text-3xl font-bold mb-2 text-zinc-900 dark:text-zinc-100 tracking-tight animate-fade-in">{{ t.title }}</h2>
      <p class="text-lg text-zinc-700 dark:text-zinc-300 mb-4 animate-fade-in-up" [innerHTML]="t.intro"></p>
      <ul class="list-none space-y-2 mb-4 animate-fade-in-up">
        @for (point of t.points; track point.text) {
          <li class="flex items-start gap-2">
            <lucide-icon [name]="point.icon" class="w-5 h-5 text-primary mt-1" />
            <span>{{ point.text }}</span>
          </li>
        }
      </ul>
      <div class="text-md text-zinc-600 dark:text-zinc-400 animate-fade-in-up" [innerHTML]="t.why"></div>
    </div>
  </div>
</section>
