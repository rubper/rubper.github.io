
    <section id="contact" class="pt-20 pb-32">
      <div class="glass-panel p-12 sm:p-16 rounded-[3rem] flex flex-col items-center text-center space-y-10 relative overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-fuchsia-500/20 blur-[100px] rounded-full"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-indigo-500/20 blur-[100px] rounded-full"></div>

        @let t = l.t().contact;
        <div class="space-y-4 max-w-2xl relative z-10">
          <h2 class="text-5xl font-black text-zinc-900 dark:text-white tracking-tighter">{{ t.titleStart }}<span class="text-gradient">{{ t.titleHighlight }}</span>{{ t.titleEnd }}</h2>
          <p class="text-xl text-zinc-600 dark:text-zinc-400 font-light leading-relaxed">
            {{ t.description }}
          </p>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-4 relative z-10">
          <a href="mailto:rub.per96@gmail.com" class="inline-flex items-center gap-3 px-10 py-5 bg-zinc-900 hover:bg-zinc-800 dark:bg-white dark:hover:bg-zinc-100 text-white dark:text-zinc-900 rounded-2xl font-bold transition-transform hover:-translate-y-1 shadow-xl shadow-zinc-900/20 dark:shadow-white/10 text-lg">
            <lucide-icon name="mail" [size]="20" [strokeWidth]="2.5"></lucide-icon>
            {{ t.cta }}
          </a>
        </div>

        <div class="flex items-center gap-6 mt-8 relative z-10">
          <a href="https://linkedin.com/in/rubper" target="_blank" aria-label="LinkedIn" class="w-14 h-14 flex items-center justify-center text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-white bg-white/50 hover:bg-white dark:bg-zinc-900/50 dark:hover:bg-zinc-800 rounded-full transition-all hover:scale-110 border border-zinc-200/50 dark:border-zinc-800/50 shadow-sm">
            <lucide-icon name="linkedin" [size]="24" [strokeWidth]="1.5"></lucide-icon>
          </a>
          <a href="https://github.com/rubper" target="_blank" aria-label="GitHub" class="w-14 h-14 flex items-center justify-center text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-white bg-white/50 hover:bg-white dark:bg-zinc-900/50 dark:hover:bg-zinc-800 rounded-full transition-all hover:scale-110 border border-zinc-200/50 dark:border-zinc-800/50 shadow-sm">
            <lucide-icon name="github" [size]="24" [strokeWidth]="1.5"></lucide-icon>
          </a>
        </div>
      </div>
    </section>
